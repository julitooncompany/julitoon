<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTPM - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: white;
            font-family: 'Figtree', sans-serif;
            font-weight: 900;
            color: black;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            position: relative;
        }

        /* Header con botón de volver */
        header {
            padding: 25px 100px;
            position: relative;
            z-index: 10;
        }

        .back-button {
            width: 148px;
            height: 148px;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .back-button:hover {
            transform: scale(1.05);
        }

        .back-button svg {
            width: 100%;
            height: 100%;
        }

        /* Sección Tarjetas Principal */
        .section-tarjetas {
            display: flex;
            gap: 42px;
            padding: 36px 100px;
            align-items: flex-start;
            margin-top: 500px;
        }

        .text-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 42px;
        }

        .text-content h1 {
            font-size: 32px;
            line-height: normal;
            font-weight: 900;
        }

        .text-content p {
            font-size: 20px;
            line-height: 1.4;
            font-weight: 900;
        }

        .card-container {
            flex-shrink: 0;
            width: 564px;
            height: 353px;
        }

        .card-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Sección Tarjetas Adicionales */
        .section-tarjetas-extra {
            display: flex;
            flex-direction: column;
            gap: 95px;
            padding: 24px 100px;
            margin-top: 50px;
        }

        .card-large {
            width: 100%;
        }

        .card-large img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        /* Tablet: 768px - 1024px */
        @media screen and (max-width: 1024px) {
            header {
                padding: 25px 100px;
            }

            .back-button {
                width: 118px;
                height: 118px;
            }

            .section-tarjetas {
                flex-direction: column;
                align-items: center;
                padding: 36px 100px;
                margin-top: 280px;
            }

            .text-content {
                text-align: center;
                align-items: center;
            }

            .card-container {
                width: 564px;
                height: 353px;
            }

            .section-tarjetas-extra {
                padding: 24px 100px;
                gap: 95px;
            }
        }

        /* Mobile: menos de 768px */
        @media screen and (max-width: 767px) {
            header {
                padding: 25px 16px;
            }

            .back-button {
                width: 66px;
                height: 66px;
            }

            .section-tarjetas {
                flex-direction: column;
                align-items: center;
                padding: 36px 16px;
                margin-top: 130px;
            }

            .text-content {
                text-align: center;
                align-items: center;
                width: 100%;
            }

            .card-container {
                width: 300px;
                height: 188px;
            }

            .section-tarjetas-extra {
                padding: 24px 16px;
                gap: 95px;
            }
        }

        /* Ajustes adicionales para pantallas muy pequeñas */
        @media screen and (max-width: 375px) {
            .text-content h1 {
                font-size: 28px;
            }

            .text-content p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Checkbox para controlar el menú (CSS puro) -->
    <input type="checkbox" id="menu-toggle" />

    <div class="container">
        <!-- Header con botón de volver -->
        <header>
            <a href="Trabajos.html" class="back-button">
                <svg fill="none" preserveAspectRatio="none" viewBox="0 0 148 148">
                    <g clip-path="url(#clip0)">
                        <path d="M133.753 39.5709L108.447 14.2648C89.4271 -4.75468 58.5904 -4.75468 39.5708 14.2648L14.2648 39.5709C-4.75475 58.5904 -4.75475 89.4272 14.2648 108.447L39.5708 133.753C58.5904 152.772 89.4271 152.772 108.447 133.753L133.753 108.447C152.772 89.4272 152.772 58.5904 133.753 39.5709Z" fill="#2E3192"/>
                        <g id="arrow_back">
                            <mask id="mask0" maskUnits="userSpaceOnUse" style="mask-type: alpha" width="96" height="96" x="26" y="26">
                                <rect fill="#D9D9D9" height="94.1818" width="94.1818" x="26.9091" y="26.9091"/>
                            </mask>
                            <g mask="url(#mask0)">
                                <path d="M57.6163 77.9242L79.592 99.9L74 105.394L42.6061 74L74 42.6061L79.592 48.1L57.6163 70.0758H105.394V77.9242H57.6163Z" fill="#FCEE21"/>
                            </g>
                        </g>
                    </g>
                    <defs>
                        <clipPath id="clip0">
                            <rect fill="white" height="148" width="148"/>
                        </clipPath>
                    </defs>
                </svg>
            </a>
        </header>

        <!-- Sección Tarjetas Principal -->
        <section class="section-tarjetas">
            <div class="text-content">
                <h1>DTPM</h1>
                <p>
                    Fue una de las ultimas clientes que<br>
                    tuve, que me pidio estas tarjetas.
                </p>
            </div>
            <div class="card-container">
                <img src="Rectangle 17.jpg" alt="Tarjeta DTPM 1">
            </div>
        </section>

        <!-- Sección Tarjetas Adicionales -->
        <section class="section-tarjetas-extra">
            <div class="card-large">
                <img src="Rectangle 19.jpg" alt="Tarjeta DTPM 2">
            </a>
            <div class="card-large">
                <img src="Rectangle 18.jpg" alt="Tarjeta DTPM 3">
            </a>
            <div class="card-large">
                <img src="Rectangle 20.jpg" alt="Tarjeta DTPM 4">
            </div>
        </section>
    </div>

</body>
</html>
