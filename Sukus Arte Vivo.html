<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sukus Arte Vivo - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: white;
            font-family: 'Figtree', sans-serif;
            font-weight: 900;
            font-style: normal;
            color: black;
            height: 1770px;
            overflow-x: hidden;
        }

        /* ── Contenedor principal ─────────────────────────────────────── */
        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ──────────────────────────────────────────────────── */
        header {
            padding: 25px 200px;
            display: flex;
            align-items: center;
            overflow: clip;
        }

        .back-button {
            display: inline-block;
            cursor: pointer;
            transition: transform 0.3s ease;
            flex-shrink: 0;
            line-height: 0;
            text-decoration: none;
        }
        .back-button:hover { transform: scale(1.05); }

        /* Un SVG por breakpoint — se muestra/oculta con CSS */
        .btn-desktop { width: 148px; height: 148px; display: block; }
        .btn-tablet  { width: 118px; height: 118px; display: none; }
        .btn-mobile  { width: 66px;  height: 66px;  display: none; }

        /* ── Sección principal (desktop: notebook frame) ─────────────── */
        /* Frame: w-[1440px] px-[200px] py-[36px], centrado verticalmente */
        .section-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px 200px;
        }

        /* Frame interno: w-[343px] en Figma, pero el texto desborda a 1240px.
           En HTML usamos width: 100% para que el texto fluya dentro del padding. */
        .text-frame {
            display: flex;
            flex-direction: column;
            gap: 110px;
            align-items: flex-start;
            width: 1440px;
            padding: 36px 100px;
        }

        .titulo {
            font-size: 32px;
            line-height: normal;
            font-weight: 900;
            font-style: normal;
            width: 100%;
        }

        .descripcion {
            font-size: 20px;
            font-weight: 900;
            font-style: normal;
            width: 420px;
            height: 144px;
            display: flex;
            text-align: left;
        }

        .video-container {
            margin-left: 100px;
            display: flex;
            justify-content: flex-end;
            width: 300px;
            height: 300px;
        }

        /* ── Tablet (768px – 1023px): SukusArteVivoTablet frame ──────── */
        @media screen and (max-width: 1023px) and (min-width: 768px) {
            header { padding: 25px 100px; }

            .btn-desktop { display: none; }
            .btn-tablet  { display: block; }
            .btn-mobile  { display: none; }

            /* Tablet: items-center, w-[834px] px-[100px] */
            .section-content {
                padding: 36px 100px;
                justify-content: center;
            }

            .text-frame { align-items: center; }
            .titulo     { text-align: center; }
            .descripcion p { text-align: center; }
        }

        /* ── Móvil (≤767px): SukusArteVivoCelu frame ────────────────── */
        @media screen and (max-width: 767px) {
            header { padding: 25px 16px; }

            .btn-desktop { display: none; }
            .btn-tablet  { display: none; }
            .btn-mobile  { display: block; }

            /* Celu: items-center, w-[375px] px-[16px] */
            .section-content { padding: 36px 16px; }

            .text-frame { align-items: center; }
            .titulo     { font-size: 32px; text-align: center; }
            .descripcion p { font-size: 20px; text-align: center; }
        }
    </style>
</head>
<body>
