    <style>
        /* Estilos específicos para la página de Trabajos */
        .trabajos {
            position: relative;
            width: 100%;
            min-height: 100vh;
        }

        .trabajos .background-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* Mostrar solo background desktop por defecto */
        .trabajos .background-desktop {
            display: block;
        }

        .trabajos .background-tablet,
        .trabajos .background-celular {
            display: none;
        }

        /* Secciones de carruseles */
        .section-carrusel {
            position: absolute;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 36px 200px;
            overflow-x: auto;
            overflow-y: clip;
        }

        .section-carrusel-1 {
            top: 256px;
            background-color: #fcee21;
        }

        .section-carrusel-2 {
            top: 740px;
            background-color: #3fa9f5;
        }

        .section-carrusel-3 {
            top: 1235px;
            background-color: #2e3192;
        }

        /* Carruseles */
        .carrusel {
            display: flex;
            gap: 95px;
            align-items: center;
            width: 100%;
            min-height: 375.872px;
        }

        .carrusel-2 {
            gap: 92px;
        }

        .carrusel-3 {
            gap: 77px;
        }

        /* Items del carrusel */
        .carrusel-item {
            flex-shrink: 0;
            width: 488.441px;
            height: 375.872px;
            position: relative;
        }

        .carrusel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 48.838px;
        }

        /* Frame "Y mas" */
        .frame-y-mas {
            background-color: #fcee21;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 145.747px 143.939px;
            border-radius: 48.823px;
            flex-shrink: 0;
            width: 488.448px;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .frame-y-mas:hover {
            transform: scale(1.05);
        }

        .frame-y-mas p {
            font-family: 'Figtree', sans-serif;
            font-weight: 900;
            font-style: normal;
            font-size: 70.406px;
            color: #2e3192;
            white-space: nowrap;
            line-height: normal;
        }

        /* Footer específico de trabajos */
        .footer-trabajos {
            position: absolute;
            left: -1px;
            top: 1701px;
            width: 1441px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 36px 200px;
        }

        /* Responsive */
        @media (max-width: 1023px) {
            /* Cambiar imagen de fondo a tablet */
            .trabajos .background-desktop {
                display: none;
            }

            .trabajos .background-tablet {
                display: block;
            }

            .section-carrusel {
                padding: 36px 100px;
            }

            .section-carrusel-1 {
                top: 203px;
            }

            .section-carrusel-2 {
                top: 687px;
            }

            .section-carrusel-3 {
                top: 1171px;
            }

            .carrusel {
                gap: 95px;
            }

            .carrusel-2 {
                gap: 92px;
            }

            .carrusel-3 {
                gap: 77px;
            }

            .carrusel-item {
                width: 488.441px;
                height: 375.872px;
            }

            .frame-y-mas {
                width: 488.448px;
                padding: 145.747px 143.939px;
            }

            .frame-y-mas p {
                font-size: 70.406px;
            }

            .footer-trabajos {
                width: 100%;
                left: -1px;
                top: 1619px;
                padding: 36px 100px;
            }

            /* Botón WhatsApp para tablet */
            .boton-whatsapp {
                left: calc(83.33% - 16px) !important;
                top: 1480px !important;
            }
        }

        @media (max-width: 767px) {
            /* Cambiar imagen de fondo a celular */
            .trabajos .background-desktop,
            .trabajos .background-tablet {
                display: none;
            }

            .trabajos .background-celular {
                display: block;
            }

            .section-carrusel {

                gap: 95px;
            }

            .carrusel-2 {
                gap: 92px;
            }

            .carrusel-3 {
                gap: 77px;
            }

                width: 488.441px;
                height: 375.872px;
            }

            .frame-y-mas {
                width: 488.448px;
                padding: 145.747px 143.939px;
            }

            .frame-y-mas p {
                font-size: 70.406px;
            }

            .footer-trabajos {
                padding: 25px 16px;
                top: 1589px;
                left: -1px;
            }

            .boton-whatsapp {
                left: calc(50% + 59.5px) !important;
                top: 1463px !important;
            }
        }

        /* ====================================
           ESTILOS DEL MENÚ DE NAVEGACIÓN
           ==================================== */

        /* Ocultar el checkbox */
        #menu-toggle {
            display: none;
        }

        /* Contenedor del menú — empieza fuera de pantalla por la izquierda */
        .menu-navegacion {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #fcee21;
            box-shadow: 0px 30px 54px 0px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateX(-100%);
            opacity: 0;
            visibility: hidden;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.35s ease,
                        visibility 0s linear 0.4s;
        }

        /* Menú activo cuando el checkbox está marcado — desliza desde la izquierda */
        #menu-toggle:checked ~ .menu-navegacion {
            transform: translateX(0);
            opacity: 1;
            visibility: visible;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.35s ease,
                        visibility 0s linear 0s;
        }

        /* Los ítems del menú aparecen con retardo escalonado */
        #menu-toggle:checked ~ .menu-navegacion .menu-item:nth-child(1) {
            animation: menuItemIn 0.35s ease 0.15s both;
        }
        #menu-toggle:checked ~ .menu-navegacion .menu-item:nth-child(2) {
            animation: menuItemIn 0.35s ease 0.23s both;
        }
        #menu-toggle:checked ~ .menu-navegacion .menu-item:nth-child(3) {
            animation: menuItemIn 0.35s ease 0.31s both;
        }

        @keyframes menuItemIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Frame del menú */
        .menu-frame {
            display: flex;
            flex-direction: column;
            gap: 37px;
            align-items: flex-start;
            width: 439px;
            max-width: 90%;
        }

        /* Item del menú */
        .menu-item {
            display: inline-grid;
            grid-template-columns: max-content;
            grid-template-rows: max-content;
            place-items: start;
            position: relative;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s ease;
            text-decoration: none;
            color: inherit;
        }

        .menu-item:hover {
            transform: translateX(10px);
        }

        .menu-item:visited {
            color: inherit;
        }

        /* Icono del menú */
        .menu-icon {
            grid-column: 1;
            grid-row: 1;
            margin-left: 0;
            margin-top: 0;
            position: relative;
            width: 107px;
            height: 107px;
        }

        /* Texto del menú */
        .menu-text {
            grid-column: 1;
            grid-row: 1;
            font-family: 'Figtree', sans-serif;
            font-weight: 900;
            line-height: normal;
            margin-left: 107px;
            margin-top: 10px;
            font-style: normal;
            position: relative;
            color: #2e3192;
            font-size: 71px;
            white-space: nowrap;
        }

        /* Botón cerrar */
        .boton-cerrar {
            position: absolute;
            display: block;
            cursor: pointer;
            left: calc(50% + 227px);
            width: 89px;
            height: 89px;
            top: 25px;
            background: none;
            border: none;
            padding: 0;
            transition: transform 0.2s ease;
        }

        .boton-cerrar label {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .boton-cerrar:hover {
            transform: rotate(90deg);
        }
    </style>
